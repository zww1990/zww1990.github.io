		<div id="app">

						cycle
						interval="3000"
						height="100%"
						hide-delimiter-background
						hide-delimiters
						show-arrows-on-hover
						progress
					  >

					  v-for="(slide, i) in slides"
					  :key="i"
					>
					  <v-img
						  :src="slide"
						  aspect-ratio="1.7"
						  contain
						></v-img>
					</v-carousel-item>

				</v-container>
			  </v-main>
			</v-app>
